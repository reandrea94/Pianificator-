<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111318;--surface:#191c24;--surface2:#1f2330;--surface3:#252a38;--border:#2a2f40;--border2:#353d54;--accent:#e8a020;--accent2:#f0c060;--blue:#4a8fe8;--green:#3ec98e;--red:#e85555;--purple:#a78bfa;--text:#dde3f0;--muted:#5a6380;--muted2:#8892aa;--cond:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-warn{0%,100%{box-shadow:0 0 5px rgba(232,160,32,.45)}50%{box-shadow:0 0 10px rgba(232,160,32,.8)}}
.spinning{animation:spin .6s linear infinite}



.body-layout{flex:1;display:flex;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .15s;letter-spacing:.04em;background:transparent;white-space:nowrap}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-accent{border-color:var(--accent);color:var(--accent)}
.btn-accent:not(:disabled):hover{background:var(--accent);color:#111}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:not(:disabled):hover{background:var(--green);color:#111}
.btn-blue{border-color:var(--blue);color:var(--blue)}
.btn-blue:not(:disabled):hover{background:var(--blue);color:#fff}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:not(:disabled):hover{background:var(--red);color:#fff}
.btn-plus{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--accent);color:var(--accent);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent;flex-shrink:0}
.btn-plus:hover{background:var(--accent);color:#111}
.btn-refresh{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);color:var(--muted2);font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent;flex-shrink:0;padding:0}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.btn-refresh:disabled{opacity:.3;cursor:not-allowed}
.dot.ok{background:var(--green)}.dot.warn{background:var(--accent)}.dot.err{background:var(--red)}.dot.idle{background:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;z-index:500;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:12px 18px;font-family:var(--mono);font-size:11px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:320px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}.toast.warn{border-color:var(--accent);color:var(--accent)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.wizard{background:var(--surface);border:1px solid var(--border2);border-radius:6px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.wiz-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.wiz-header h2{font-family:var(--cond);font-size:18px;font-weight:600;letter-spacing:.06em;color:var(--accent);flex:1}
.wiz-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px}
.wiz-close:hover{color:var(--red)}
.wiz-body{padding:20px 24px}
.wiz-step{margin-bottom:20px}
.wiz-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted2);margin-bottom:7px;display:block;text-transform:uppercase}
.wiz-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wiz-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none}
.wiz-input:focus{border-color:var(--accent)}
.wiz-input::placeholder{color:var(--muted)}
.preview-box{font-family:var(--mono);font-size:12px;color:var(--accent2);background:rgba(232,160,32,.07);border:1px solid rgba(232,160,32,.2);padding:7px 11px;border-radius:3px;min-height:30px;word-break:break-all;margin-top:4px}
.wiz-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.btn-wiz-cancel{font-family:var(--mono);font-size:12px;padding:8px 18px;border-radius:3px;border:1px solid var(--border2);color:var(--muted2);background:none;cursor:pointer}

.btn-wiz-ok:hover:not(:disabled){background:var(--accent2)}
.btn-wiz-ok:disabled{opacity:.3;cursor:not-allowed}
</style>

.strut-fix-btn{

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// STATO
// ═══════════════════════════════════════════════════════
const S = {
  rootHandle: null,  // FileSystemDirectoryHandle (da OMAV_BRIDGE)
  active:     null,
};

const REQUIRED_FOLDERS = [
  { key:'wd',       type:'WD',  label:'Working Documents',   desc:'Struttura cantiere (WD_r*)' },
  { key:'fd',       type:'FD',  label:'Final Documents',     desc:'Struttura finale (FD_r*)' },
];

const FOLDERS_CANTIERE = [
  { name:'01_InternalRules_Omav-SMS_(PDF)',         subs:[] },
  { name:'02_SafetyValidationProcedure_QC_(DOC)',   subs:[] },
  { name:'03_PressInstallationStartupManual_(PDF)', subs:[] },
  { name:'04_Layout_(DWG-PDF)',                     subs:[] },
  { name:'05_Diagrams_(DWG-PDF)',                   subs:['Electrical','Hydraulic','Pneumatic','Combustion','Water'] },
  { name:'06_SafetyMatrix_(PDF)',                   subs:[] },
  { name:'07_Drawings_(DWG-PDF)',                   subs:'MACHINES' },
  { name:'08_SubcontractorsEngineering_(DWG-PDF)',  subs:[] },
];

const FOLDERS_FINALE = [
  { name:'Att01_OperatorsManuals',     subs:[] },
  { name:'Att02_Declarations',         subs:[] },
  { name:'Att03_AssemblyInstructions', subs:[] },
  { name:'Att04_Layout',               subs:[] },
  { name:'Att05_Drawings',             subs:[] },
  { name:'Att06_Diagrams',             subs:['Combustion','Electric','Hydraulic','Pneumatic','Water'] },
  { name:'Att07_Commercialcomponents', subs:[] },
];


// ── FS helpers (solo modalità handle) ───────────────────────────
async function fsLs(relPath) {
  const parts = String(relPath).split('/').filter(Boolean);
  // Ottimizzazione: se il primo segmento è la commessa attiva e abbiamo il handle diretto, usalo
  let h = S.rootHandle;
  let startIdx = 0;
  if (S.active?.handle && parts[0] === S.active.name) {
    h = S.active.handle;
    startIdx = 1;
  }
  if (!h) return [];
  for (let i = startIdx; i < parts.length; i++) {
    try { h = await h.getDirectoryHandle(parts[i]); }
    catch(e) { return []; }
  }
  const out = [];
  for await (const [name, fh] of h.entries())
    out.push({ name, kind:fh.kind, handle:fh, ext:fh.kind==='file'?name.split('.').pop().toLowerCase():'', size:0 });
  return out;
}
async function fsMkdir(relPath) {
  const parts = String(relPath).split('/').filter(Boolean);
  let h = S.rootHandle;
  let startIdx = 0;
  if (S.active?.handle && parts[0] === S.active.name) {
    h = S.active.handle;
    startIdx = 1;
  }
  for (let i = startIdx; i < parts.length; i++)
    h = await h.getDirectoryHandle(parts[i], { create:true });
  return true;
}
async function fsReadBuf(relPath) {
  const parts = String(relPath).split('/').filter(Boolean);
  let h = S.rootHandle;
  let startIdx = 0;
  if (S.active?.handle && parts[0] === S.active.name) {
    h = S.active.handle;
    startIdx = 1;
  }
  for (let i = startIdx; i < parts.length - 1; i++) {
    try { h = await h.getDirectoryHandle(parts[i]); } catch(e) { return null; }
  }
  try { return await (await (await h.getFileHandle(parts[parts.length-1])).getFile()).arrayBuffer(); } catch(e) { return null; }
}
// path join: sempre '/' (solo handle)
function pj(...parts) {
  return parts.filter(p => p != null && p !== '').map(p=>String(p).replace(/\\/g,'/')).join('/').replace(/\/+/g,'/');
}


// ── IndexedDB helpers (stesso store di Index e Impostazioni) ──────
function openIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('omav-suite-v3',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('h');
    r.onsuccess=e=>res(e.target.result);
    r.onerror=rej;
  });
}
async function loadH(k){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('h','readonly');
    const r=tx.objectStore('h').get(k);
    r.onsuccess=e=>res(e.target.result||null);
    r.onerror=rej;
  });
}

// ── Avvio: modalità bridge da Index.html + fallback IDB ───────────
(async () => {
  // Carica catalogo macchine da IDB in background (per autocomplete Job Order)
  await mlLoadFromIDB();

  // Prova prima il bridge da Index
  try {
    const bridge = window.parent?.OMAV_BRIDGE;
    if (bridge?.commHandle) {
      S.rootHandle = bridge.commHandle;
      setStatus('Pronto','ok');
      if (bridge.activeCommessa) {
        for await (const [name, handle] of bridge.commHandle.entries()) {
          if (handle.kind === 'directory' && name.startsWith(bridge.activeCommessa + '_')) {
            const m = name.match(/^(\d{4})_(.+)_([A-Z]{2,4})$/);
            if (m) await selectCommessa({ code:m[1], desc:m[2].replace(/_/g,' '), country:m[3], name, handle });
            break;
          }
        }
      }
      return; // bridge ok, stop
    }
  } catch(e) {}

  // Fallback: legge commHandle da IDB direttamente
  try {
    const h = await loadH('comm');
    if (h) {
      let perm = await h.queryPermission({ mode:'readwrite' });
      if (perm === 'prompt') perm = await h.requestPermission({ mode:'readwrite' });
      if (perm === 'granted') {
        S.rootHandle = h;
        setStatus('Pronto','ok');
        // Nessuna commessa attiva nota — mostra solo stato pronto
        return;
      }
    }
  } catch(e) {}

  setStatus('Cartella commesse non collegata — configura in Impostazioni > Percorsi','err');
})();

// ── Ascolta aggiornamenti da Index (es. dopo openTool o reconnect) ──
window.addEventListener('message', async (e) => {
  if (e.data?.type === 'OMAV_RELOAD') {
    const bridge = window.parent?.OMAV_BRIDGE;
    if (!bridge) return;

    // Aggiorna rootHandle se disponibile
    if (bridge.commHandle) S.rootHandle = bridge.commHandle;

    // Carica commessa attiva
    if (bridge.activeCommessa && S.rootHandle) {
      try {
        for await (const [name, handle] of S.rootHandle.entries()) {
          if (handle.kind === 'directory' && name.startsWith(bridge.activeCommessa + '_')) {
            const m = name.match(/^(\d{4})_(.+)_([A-Z]{2,4})$/);
            if (m) {
              await selectCommessa({ code:m[1], desc:m[2].replace(/_/g,' '), country:m[3], name, handle });
            }
            break;
          }
        }
      } catch(e) { console.error('OMAV_RELOAD error:', e); }
    }
  }
});

// ═══════════════════════════════════════════════════════
// SELEZIONE COMMESSA
// ═══════════════════════════════════════════════════════
// Accetta nome cartella (stringa) oppure oggetto {code,desc,country,name,handle}
async function selectCommessa(commessa) {
  let c;
  if (typeof commessa === 'string') {
    const COMMESSA_RE = /^(\d{4})_(.+)_([A-Z]{2,4})$/;
    const m = commessa.match(COMMESSA_RE);
    if (!m) return;
    c = { code: m[1], desc: m[2].replace(/_/g,' '), country: m[3], name: commessa, handle: null };
  } else {
    c = commessa;
  }
  S.active = c;
  await loadStrutturaTab();
}

async function refreshActive() {
  if (!S.active) return;
  const btn = document.getElementById('btnAggiorna');
  btn.classList.add('spinning'); btn.disabled = true;
  await loadStrutturaTab();
  if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  toast('Aggiornato','ok');
}

// ═══════════════════════════════════════════════════════
// HELPER: trova cartella revisione
// ═══════════════════════════════════════════════════════
async function findRevFolder(commessaPath, code, type) {
  const re = type === 'JOB'
    ? new RegExp('^' + code + '_Job order documents$', 'i')
    : new RegExp('^' + code + '_' + type + '_r', 'i');
  const items = await fsLs(commessaPath);
  const found = items.find(i => i.kind === 'directory' && re.test(i.name));
  return found ? { name: found.name, path: pj(commessaPath, found.name) } : null;
}

// ═══════════════════════════════════════════════════════
// SCHEDA STRUTTURA
// ═══════════════════════════════════════════════════════
async function loadStrutturaTab() {
  if (!S.active) return;

  // Verifica handle disponibile
  if (!S.active.handle && !S.rootHandle) {
    document.getElementById('strutCards').innerHTML = `<div class="strut-card miss"><span class="strut-icon">⚠️</span><div class="strut-info"><span class="strut-folder-name">Cartella commesse non collegata</span><span class="strut-folder-sub">Vai in Impostazioni → Percorsi e collega la cartella radice commesse</span></div></div>`;
    document.getElementById('strutOverall').className = 'strut-overall miss';
    document.getElementById('strutOverall').textContent = '⚠ Cartella non disponibile';
    return;
  }
  const cardsEl   = document.getElementById('strutCards');
  const overallEl = document.getElementById('strutOverall');
  const strutArea = document.getElementById('strutArea');
  document.getElementById('strutActions').style.display = 'flex';
  overallEl.className = 'strut-overall loading';
  overallEl.textContent = '⏳ Verifica in corso…';
  cardsEl.innerHTML = `<div class="strut-card loading"><span class="strut-icon">⏳</span><div class="strut-info"><span class="strut-folder-name">Analisi…</span></div></div>`;
  strutArea.innerHTML = `<div class="tree-empty"><div style="font-size:28px;opacity:.2">⏳</div>Caricamento…</div>`;

  const commessaPath = pj(S.active.name);

  // 1. Cartelle obbligatorie
  const folderResults = await Promise.all(REQUIRED_FOLDERS.map(async f => {
    const res = await findRevFolder(commessaPath, S.active.code, f.type);
    return { ...f, folderName: res ? res.name : `${S.active.code}_${f.type}_r??`, found: !!res, path: res?.path };
  }));

  // 2. Excel in Job order
  const jobRes = folderResults.find(f => f.type === 'JOB');
  let excelFound = false, excelName = '';
  if (jobRes?.path) {
    const jobItems = await fsLs(jobRes.path);
    const xl = jobItems.find(i => i.kind === 'file' && /\.(xlsx|xls)$/i.test(i.name));
    if (xl) { excelFound = true; excelName = xl.name; }
  }
  const excelResult = {
    folderName: excelFound ? excelName : `${S.active.code}_Machine_list.xlsx`,
    desc: 'Lista macchine Excel in Job order documents',
    found: excelFound, isFile: true,
  };

  // 3. Lista macchine
  const machines = [];

  // 4. Drawings WD e FD
  const drawingChecks = await checkDrawingsFolders(folderResults, machines, commessaPath);
  const wdDrawings = drawingChecks.wd.results;
  const fdDrawings = drawingChecks.fd.results;
  window._strutDrawPaths    = { wd: drawingChecks.wd.drawPath, fd: drawingChecks.fd.drawPath };
  window._strutFolderResults = folderResults;
  window._strutCommessaPath  = commessaPath;

  // 5. Totale problemi
  const totalMiss = folderResults.filter(r=>!r.found).length
    + (excelFound ? 0 : 1)
    + wdDrawings.filter(r=>!r.found).length
    + fdDrawings.filter(r=>!r.found).length;
  const allOk = totalMiss === 0;

  // 6. Render cards
  let html = '<div class="strut-section-label">Cartelle obbligatorie</div>';
  html += folderResults.map(r => strutCard(r)).join('');
  html += '<div class="strut-section-label" style="margin-top:10px">Lista macchine Excel</div>';
  html += strutCard(excelResult);

  if (machines.length > 0) {
    const wdMiss = wdDrawings.filter(r=>!r.found).length;
    html += `<div class="strut-section-label" style="margin-top:10px">07_Drawings WD
      ${wdMiss ? `<span class="strut-miss-count">${wdMiss} mancant${wdMiss>1?'i':'e'}</span>
        <button class="strut-fix-btn" onclick="createMissingDrawings('wd')">＋ Crea mancanti</button>`
        : '<span class="strut-ok-count">✓</span>'}
    </div>`;
    html += wdDrawings.map(r => strutCard(r, true)).join('');

    const fdMiss = fdDrawings.filter(r=>!r.found).length;
    html += `<div class="strut-section-label" style="margin-top:10px">Att05_Drawings FD
      ${fdMiss ? `<span class="strut-miss-count">${fdMiss} mancant${fdMiss>1?'i':'e'}</span>
        <button class="strut-fix-btn" onclick="createMissingDrawings('fd')">＋ Crea mancanti</button>`
        : '<span class="strut-ok-count">✓</span>'}
    </div>`;
    html += fdDrawings.map(r => strutCard(r, true)).join('');
  } else {
    html += '<div class="strut-section-label" style="margin-top:10px;opacity:.5">Drawings — nessuna macchina in lista</div>';
  }

  cardsEl.innerHTML = html;

  overallEl.className = allOk ? 'strut-overall ok' : 'strut-overall miss';
  overallEl.textContent = allOk ? '✓ STRUTTURA COMPLETA' : `✗ ${totalMiss} CARTEL${totalMiss>1?'LE MANCANTI':'LA MANCANTE'}`;

  S.active.strutOk   = allOk;
  S.active.strutMiss = totalMiss;

  await renderStrutturaTree(commessaPath, S.active.name);
}

function strutCard(r, compact = false) {
  const cls  = r.found ? 'ok' : 'miss';
  const icon = r.found ? (r.isFile ? '📊' : '✅') : (r.isFile ? '📊' : '❌');
  return `<div class="strut-card ${cls}${compact?' strut-card-compact':''}">
    <span class="strut-icon">${icon}</span>
    <div class="strut-info">
      <span class="strut-folder-name">${esc(r.folderName)}</span>
      ${r.desc && !compact ? `<span class="strut-folder-sub">${r.desc}</span>` : ''}
    </div>
    <span class="strut-badge ${cls}">${r.found?'PRESENTE':'MANCANTE'}</span>
  </div>`;
}

async function openWizard() {
  if (!S.active) return;
  document.getElementById('wizPreviewName').textContent = S.active.name;
  document.getElementById('wizExcelIcon').textContent = '⏳';
  document.getElementById('wizExcelMsg').textContent = 'Ricerca in corso…';
  document.getElementById('btnWizOk').disabled = true;
  document.getElementById('overlay').classList.add('open');
  // Cerca Excel
  const commessaPath = pj(S.active.name);
  const jobRes = await findRevFolder(commessaPath, S.active.code, 'JOB');
  const machines = [];
  if (machines.length) {
    document.getElementById('wizExcelIcon').textContent = '✅';
    document.getElementById('wizExcelMsg').textContent = `${machines.length} macchine trovate`;
    document.getElementById('wizMachinePreview').innerHTML = `
      <div style="max-height:120px;overflow-y:auto;margin-top:8px;border:1px solid var(--border);border-radius:3px">
        ${machines.map(m=>`<div class="mrow"><span class="mc">${esc(m.code)}</span><span class="md">${esc(m.desc)}</span></div>`).join('')}
      </div>`;
    document.getElementById('btnWizOk').disabled = false;
  } else {
    document.getElementById('wizExcelIcon').textContent = '⚠️';
    document.getElementById('wizExcelMsg').textContent = 'Nessun Excel trovato — struttura base verrà creata';
    document.getElementById('wizMachinePreview').innerHTML = '';
    document.getElementById('btnWizOk').disabled = false;
  }
}
function closeWizard() { document.getElementById('overlay').classList.remove('open'); }

async function generateStructure() {
  if (!S.active) return;
  document.getElementById('btnWizOk').disabled = true;
  document.getElementById('btnWizOk').textContent = '⏳ Generazione…';
  setStatus('Generazione struttura…','warn');

  const commessaPath = pj(S.active.name);
  const jobRes = await findRevFolder(commessaPath, S.active.code, 'JOB');
  const machines = [];

  let created = 0;

  // Cartella Job order documents
  const jobFolder = pj(commessaPath, `${S.active.code}_Job order documents`);
  await fsMkdir(jobFolder); created++;

  // WD
  const wdFolder = pj(commessaPath, `${S.active.code}_WD_r01`);
  for (const f of FOLDERS_CANTIERE) {
    const fp = pj(wdFolder, f.name);
    await fsMkdir(fp); created++;
    for (const s of (f.subs === 'MACHINES' ? [] : f.subs)) {
      await fsMkdir(pj(fp, s)); created++;
    }
    if (f.subs === 'MACHINES' && machines.length) {
      for (const m of machines) {
        await fsMkdir(pj(fp, sanitize(m.desc ? `${m.code}_${m.desc}` : m.code))); created++;
      }
    }
  }

  // FD
  const fdFolder = pj(commessaPath, `${S.active.code}_FD_r01`);
  for (const f of FOLDERS_FINALE) {
    const fp = pj(fdFolder, f.name);
    await fsMkdir(fp); created++;
    for (const s of f.subs) { await fsMkdir(pj(fp, s)); created++; }
  }
  if (machines.length) {
    for (const m of machines) {
      await fsMkdir(pj(fdFolder, 'Att05_Drawings', sanitize(m.desc ? `${m.code}_${m.desc}` : m.code))); created++;
    }
  }

  closeWizard();
  toast(`✅ Struttura creata — ${created} cartelle`, 'ok');
  setStatus('Struttura generata','ok');
  document.getElementById('btnWizOk').textContent = '⚡ Genera struttura';
  await loadStrutturaTab();
}

// ═══════════════════════════════════════════════════════
// CATALOGO MACCHINE — caricamento da machine_catalog.json via dbHandle IDB
// ═══════════════════════════════════════════════════════
async function mlLoadFromIDB() {
  try {
    const h = await loadH('db');
    if (!h) return;
    const perm = await h.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') return;
    const fh   = await h.getFileHandle('machine_catalog.json');
    const data = JSON.parse(await (await fh.getFile()).text());
    ML.machines   = Array.isArray(data) ? data : (data.machines || []);
    ML.lastUpdate = data.lastUpdate || null;
  } catch(e) {
    ML.machines = []; ML.lastUpdate = null;
  }
}
